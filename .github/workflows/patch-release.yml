name: Patch Release

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "packages/*/package.json"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  patch-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Detect changed packages
        id: versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const { execSync } = require('node:child_process');

          const workspaceDirs = fs.readdirSync('packages', { withFileTypes: true })
            .filter(d => d.isDirectory())
            .map(d => path.join('packages', d.name));

          const allPkgPaths = ['package.json', ...workspaceDirs.map(d => path.join(d, 'package.json'))];

          // Find which package.json files changed in this push
          const changedFiles = execSync('git diff --name-only HEAD^ HEAD', { encoding: 'utf8' })
            .split('\n')
            .map(f => f.trim())
            .filter(Boolean);

          const changedPkgPaths = allPkgPaths.filter(p => changedFiles.includes(p.replace(/\\/g, '/')));

          if (changedPkgPaths.length === 0) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_release=false\n');
            console.log('No package.json changed, stopping.');
            process.exit(0);
          }

          const parseSemver = (value) => {
            const match = /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(value || '');
            if (!match) return null;
            return { major: Number(match[1]), minor: Number(match[2]), patch: Number(match[3]) };
          };

          const parseJson = (content) => JSON.parse(content.replace(/^\uFEFF/, ''));
          const readPackageJson = (pkgPath) => parseJson(fs.readFileSync(pkgPath, 'utf8'));

          // Collect bumped packages
          const bumps = [];

          for (const pkgPath of changedPkgPaths) {
            const current = readPackageJson(pkgPath);

            // Skip private packages (like root)
            if (current.private) continue;

            let old = null;
            try {
              const oldContent = execSync(`git show HEAD^:${pkgPath}`, {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'ignore']
              });
              old = parseJson(oldContent);
            } catch {
              // New package first releases are intentionally skipped.
              // Publish them manually so the initial release stays controlled.
            }

            const oldParsed = parseSemver(old?.version);
            const newParsed = parseSemver(current.version);

            if (oldParsed && newParsed &&
                oldParsed.major === newParsed.major &&
                oldParsed.minor === newParsed.minor &&
                oldParsed.patch !== newParsed.patch) {
              bumps.push({
                name: current.name,
                path: path.dirname(pkgPath),
                oldVersion: old.version,
                newVersion: current.version
              });
            }
          }

          if (bumps.length === 0) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_release=false\n');
            console.log('No patch-level version bump detected.');
            process.exit(0);
          }

          const tagVersion = bumps[0].newVersion;
          const packageList = bumps.map(b => b.name).join(', ');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_release=true\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag_version=${tagVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `packages=${packageList}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `bump_count=${bumps.length}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `publish_dirs=${bumps.map(b => b.path).join(' ')}\n`);

          console.log('Bumped packages:', bumps.map(b => `${b.name}: ${b.oldVersion} -> ${b.newVersion}`).join(', '));
          NODE

      - name: Stop when no patch bump
        if: steps.versions.outputs.should_release != 'true'
        run: echo "No patch bump detected, skipping release."

      - name: Setup Node.js with pnpm cache
        if: steps.versions.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Prepare tag and release text
        if: steps.versions.outputs.should_release == 'true'
        id: release_meta
        shell: bash
        run: |
          git fetch --tags --force

          NEW_TAG="v${{ steps.versions.outputs.tag_version }}"
          PREV_TAG=$(git tag --sort=-v:refname | head -n 1 || true)

          {
            echo "new_tag=$NEW_TAG"
            echo "release_body<<EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "Changed packages: ${{ steps.versions.outputs.packages }}"
              echo "View this change: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${NEW_TAG}"
            else
              echo "First release, view repository: https://github.com/${{ github.repository }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.versions.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build project
        if: steps.versions.outputs.should_release == 'true'
        run: pnpm build

      - name: Run tests
        if: steps.versions.outputs.should_release == 'true'
        run: pnpm test

      - name: Skip automated release while initial publishing is manual
        if: steps.versions.outputs.should_release == 'true'
        run: |
          echo "Patch bump detected for: ${{ steps.versions.outputs.packages }}"
          echo "Automated tag, GitHub Release, and npm publish are temporarily disabled."

      - name: Create and push tag
        if: false
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          TAG="${{ steps.release_meta.outputs.new_tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote, skip creating tag."
          else
            echo "Creating tag ${TAG}..."
            git tag -a "$TAG" -m "${{ steps.release_meta.outputs.release_body }}"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub Release
        if: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.release_meta.outputs.new_tag }}"
          BODY="${{ steps.release_meta.outputs.release_body }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes "$BODY"
          else
            gh release create "$TAG" --title "$TAG" --notes "$BODY"
          fi

      - name: Publish to npm
        if: false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          for dir in ${{ steps.versions.outputs.publish_dirs }}; do
            echo "Publishing $dir..."
            (cd "$dir" && pnpm publish --no-git-checks --access public)
          done
